<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Page</title>
</head>

<body>

<h2>order page</h2>

<form>

    
    <fieldset>
        <legend>Personal information</legend>

        <table width="100%" cellpadding="10">

            <tr>
                <td colspan="2">
                    <input type="text" placeholder="Your name" size="50">
                </td>
            </tr>

            <tr>
                <td>
                    <input type="email" placeholder="Email">
                </td>
                <td>
                    <input type="text" placeholder="Phone number">
                </td>
            </tr>

        </table>
    </fieldset>

    <br>

    
    <fieldset>
        <legend>Shipping address</legend>

        <table width="100%" cellpadding="10">

            <tr>
                <td>
                    <input type="text" placeholder="ADDRESS">
                </td>
               
            </tr>

            <tr>
                <td>
                    <input type="text" placeholder="CITY">
                </td>
                
            </tr>

        </table>
    </fieldset>

    <br>

    
    <fieldset>
        <legend>Voucher no</legend>

        <input type="text" size="50">
    </fieldset>

    <br>

    
    <fieldset>
        <legend>Payment methods</legend>

        <input type="radio" name="payment"> Cash on delivery
        <input type="radio" name="payment"> credit or debit

        <br><br>

        <table cellpadding="10">

            <tr>
                <td colspan="2">
                    <input type="text" placeholder="Cardholder name" size="50">
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input type="text" placeholder="Card number" size="50">
                </td>
            </tr>

            <tr>
                <td>
                    <input type="text" placeholder="EXP date">
                </td>
                <td>
                    <input type="text" placeholder="CVC">
                </td>
            </tr>

        </table>

    </fieldset>

    <br>

    <a href="checkout.html">Place Order</a>

</form>

</body>
</html>
